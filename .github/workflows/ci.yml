name: CI

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  CMAKE_VERSION: "4.2.3"

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake ${{ env.CMAKE_VERSION }}
        run: |
          wget -qO- https://github.com/Kitware/CMake/releases/download/v${{ env.CMAKE_VERSION }}/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64.tar.gz | tar xz
          echo "$PWD/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 pkg-config autoconf automake libtool make gcc

      - name: Configure
        env:
          CXX: g++-14
        run: cmake --preset linux-x86_64-release

      - name: Build
        run: cmake --build --preset linux-x86_64-release --parallel

  build-linux-aarch64:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/daixtrose/cross-build-bookworm-arm64:latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset linux-aarch64-release

      - name: Build
        run: cmake --build --preset linux-aarch64-release --parallel

  build-windows-x86_64:
    runs-on: windows-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            autoconf
            automake
            libtool
            make
            pkg-config
            gettext
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-x86_64-release

      - name: Prepare autotools
        run: |
          cd build/windows-x86_64-release/_deps/libmodbus-src
          ./autogen.sh

      - name: Build
        run: cmake --build --preset windows-x86_64-release --parallel
